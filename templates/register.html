<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Créer un compte - Omada API Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container">
    <div class="row justify-content-center" style="margin-top: 10vh;">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <img src="/static/img/logo.svg" alt="Omada API Hub" height="60" class="mb-3">
                        <h5 class="fw-bold mb-0">Créer un compte</h5>
                        <p class="text-muted small mt-1">
                            <i class="bi bi-person-plus"></i> Inscription
                        </p>
                    </div>

                    {% if error %}
                    <div class="alert alert-danger d-flex align-items-center py-2" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <span>{{ error }}</span>
                    </div>
                    {% endif %}

                    {% if success %}
                    <div class="alert alert-success d-flex align-items-center py-2" role="alert">
                        <i class="bi bi-check-circle-fill me-2"></i>
                        <span>{{ success }}</span>
                    </div>
                    <div class="text-center mt-2">
                        <a href="{{ url_for('auth.app_login_page') }}" class="btn btn-primary btn-sm">
                            <i class="bi bi-box-arrow-in-right"></i> Se connecter
                        </a>
                    </div>
                    {% else %}
                    <form method="post" action="{{ url_for('auth.app_register_page') }}" autocomplete="on">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">
                                <i class="bi bi-person"></i> Nom d'utilisateur
                            </label>
                            <input type="text" class="form-control" id="username" name="username"
                                   autofocus autocomplete="username" required minlength="3">
                            <div class="form-text">3 caractères minimum.</div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold">
                                <i class="bi bi-key"></i> Mot de passe
                            </label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="password" name="password"
                                       autocomplete="new-password" required minlength="8">
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePwd('password','eye1')" tabindex="-1">
                                    <i class="bi bi-eye" id="eye1"></i>
                                </button>
                            </div>
                            <div class="form-text">8 caractères minimum.</div>
                        </div>

                        <div class="mb-3">
                            <label for="confirm_password" class="form-label fw-semibold">
                                <i class="bi bi-key-fill"></i> Confirmer le mot de passe
                            </label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="confirm_password"
                                       name="confirm_password" autocomplete="new-password" required>
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePwd('confirm_password','eye2')" tabindex="-1">
                                    <i class="bi bi-eye" id="eye2"></i>
                                </button>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="email" class="form-label fw-semibold">
                                <i class="bi bi-envelope"></i> Email de récupération
                            </label>
                            <input type="email" class="form-control" id="email" name="email"
                                   autocomplete="email" placeholder="votre@email.com">
                            <div class="form-text">Recommandé — permet de réinitialiser votre mot de passe.</div>
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            <i class="bi bi-person-check"></i> Créer mon compte
                        </button>
                    </form>
                    {% endif %}

                    <hr class="my-3">
                    <div class="text-center">
                        <a href="{{ url_for('auth.app_login_page') }}" class="text-decoration-none small">
                            <i class="bi bi-arrow-left"></i> Retour à la connexion
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
function togglePwd(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
    }
}
</script>
</body>
</html>
