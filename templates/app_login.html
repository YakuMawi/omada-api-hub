<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Accès - Omada API Hub</title>

    <!-- PWA -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0d6efd">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="API Hub">
    <link rel="apple-touch-icon" href="/static/img/icon-pwa.svg">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container">
    <div class="row justify-content-center" style="margin-top: 10vh;">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <img src="/static/img/logo.svg" alt="Omada API Hub" height="60" class="mb-3">
                        <h5 class="fw-bold mb-0">Omada API Hub</h5>
                        <p class="text-muted small mt-1">
                            <i class="bi bi-shield-lock"></i> Accès sécurisé
                        </p>
                    </div>

                    {% if error %}
                    <div class="alert alert-danger d-flex align-items-center py-2" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <span>{{ error }}</span>
                    </div>
                    {% endif %}

                    <form method="post" action="{{ url_for('app_login_page') }}" autocomplete="on">
                        <input type="hidden" name="next" value="{{ next }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">
                                <i class="bi bi-person"></i> Utilisateur
                            </label>
                            <input type="text" class="form-control" id="username" name="username"
                                   autofocus autocomplete="username" required>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">
                                <i class="bi bi-key"></i> Mot de passe
                            </label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="password" name="password"
                                       autocomplete="current-password" required>
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePassword()" tabindex="-1" title="Afficher/masquer">
                                    <i class="bi bi-eye" id="eye-icon"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-box-arrow-in-right"></i> Se connecter
                        </button>
                    </form>

                    <hr class="my-3">
                    <div class="text-center d-flex justify-content-between px-1">
                        <a href="{{ url_for('app_register_page') }}" class="text-decoration-none small">
                            <i class="bi bi-person-plus"></i> Créer un compte
                        </a>
                        <a href="{{ url_for('app_forgot_password') }}" class="text-decoration-none small text-muted">
                            <i class="bi bi-question-circle"></i> Mot de passe oublié ?
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js').catch(() => {});
}
function togglePassword() {
    const input = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
    }
}
</script>
</body>
</html>
