<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Réinitialiser le mot de passe - Omada API Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container">
    <div class="row justify-content-center" style="margin-top: 10vh;">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <img src="/static/img/logo.svg" alt="Omada API Hub" height="60" class="mb-3">
                        <h5 class="fw-bold mb-0">Réinitialiser le mot de passe</h5>
                    </div>

                    {% if error %}
                    <div class="alert alert-danger d-flex align-items-center py-2">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i><span>{{ error }}</span>
                    </div>
                    {% endif %}

                    {% if use_smtp and not code_ok %}
                    <!-- Étape A : saisir le code reçu par email -->
                    <p class="text-muted small text-center mb-3">
                        <i class="bi bi-envelope-check"></i>
                        Un code à 6 chiffres vous a été envoyé par email. Il est valable 15 minutes.
                    </p>
                    <form method="post">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                        <div class="mb-4">
                            <label for="code" class="form-label fw-semibold">
                                <i class="bi bi-123"></i> Code de vérification
                            </label>
                            <input type="text" class="form-control form-control-lg text-center fw-bold"
                                   id="code" name="code" maxlength="6" minlength="6"
                                   pattern="\d{6}" autofocus required placeholder="000000"
                                   inputmode="numeric">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-check-circle"></i> Vérifier le code
                        </button>
                    </form>

                    {% else %}
                    <!-- Étape B : nouveau mot de passe -->
                    <form method="post">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                        <div class="mb-3">
                            <label for="new_password" class="form-label fw-semibold">
                                <i class="bi bi-key"></i> Nouveau mot de passe
                            </label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="new_password"
                                       name="new_password" minlength="8" autofocus required>
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePwd('new_password','eye1')" tabindex="-1">
                                    <i class="bi bi-eye" id="eye1"></i>
                                </button>
                            </div>
                            <div class="form-text">8 caractères minimum.</div>
                        </div>
                        <div class="mb-4">
                            <label for="confirm_password" class="form-label fw-semibold">
                                <i class="bi bi-key-fill"></i> Confirmer
                            </label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="confirm_password"
                                       name="confirm_password" required>
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePwd('confirm_password','eye2')" tabindex="-1">
                                    <i class="bi bi-eye" id="eye2"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success w-100">
                            <i class="bi bi-shield-check"></i> Enregistrer le nouveau mot de passe
                        </button>
                    </form>
                    {% endif %}

                    <hr class="my-3">
                    <div class="text-center">
                        <a href="{{ url_for('auth.app_login_page') }}" class="text-decoration-none small">
                            <i class="bi bi-arrow-left"></i> Retour à la connexion
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
function togglePwd(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    input.type  = input.type === 'password' ? 'text' : 'password';
    icon.className = input.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
</script>
</body>
</html>
